<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Kevin Moenga</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #dff3fb, #b8e4f7, #cdeeff);
            color: #1a2a3a;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated background particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: rgba(102, 180, 234, 0.25);
            border-radius: 50%;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            25% { transform: translateY(-50px) translateX(30px); }
            50% { transform: translateY(-100px) translateX(-30px); }
            75% { transform: translateY(-50px) translateX(30px); }
        }

        /* Header styles */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(220, 243, 255, 0.75);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid rgba(102, 180, 234, 0.3);
            animation: slideDown 0.8s ease;
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1a7fc1 0%, #0f5a9c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        header h2:hover { transform: scale(1.05); }

        nav ul {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        nav ul li a {
            color: #1a3a5c;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            position: relative;
            padding: 0.5rem 0;
            transition: color 0.3s ease;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(135deg, #1a7fc1 0%, #0f5a9c 100%);
            transition: width 0.3s ease;
        }

        nav ul li a:hover { color: #1a7fc1; }
        nav ul li a:hover::after { width: 100%; }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8rem 8% 4rem;
            gap: 4rem;
            position: relative;
            z-index: 1;
        }

        .hero-text {
            flex: 1;
            opacity: 0;
            animation: fadeInLeft 1s ease forwards;
            animation-delay: 0.3s;
        }

        @keyframes fadeInLeft {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .hero-text h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            line-height: 1.2;
            color: #0d2a44;
        }

        .hero-text h1 span {
            background: linear-gradient(135deg, #1a7fc1 0%, #0f5a9c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
            animation: wave 2s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(20deg); }
            75% { transform: rotate(-20deg); }
        }

        .hero-text h3 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            color: #1a7fc1;
            font-weight: 600;
        }

        .hero-text p {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #2a4a6a;
            margin-bottom: 2.5rem;
            max-width: 600px;
        }

        .buttons {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .buttons a {
            padding: 1rem 2.5rem;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .buttons a:first-child {
            background: linear-gradient(135deg, #1a7fc1 0%, #0f5a9c 100%);
            color: #fff;
            box-shadow: 0 10px 30px rgba(26, 127, 193, 0.35);
        }

        .buttons a:first-child:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(26, 127, 193, 0.55);
        }

        .buttons a:last-child {
            background: transparent;
            color: #1a3a5c;
            border: 2px solid #1a7fc1;
        }

        .buttons a:last-child:hover {
            background: rgba(26, 127, 193, 0.1);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(26, 127, 193, 0.2);
        }

        /* Hero Image */
        .hero-image {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            animation: fadeInRight 1s ease forwards;
            animation-delay: 0.5s;
        }

        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .hero-image img {
            width: 350px;
            height: 350px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid rgba(26, 127, 193, 0.35);
            box-shadow: 0 0 60px rgba(26, 127, 193, 0.4);
            animation: float-image 6s ease-in-out infinite;
            position: relative;
        }

        @keyframes float-image {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .hero-image::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #1a7fc1 0%, #5bb8f5 100%);
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.2;
            z-index: -1;
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.1); opacity: 0.35; }
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem;
            background: rgba(184, 228, 247, 0.6);
            border-top: 1px solid rgba(26, 127, 193, 0.2);
            position: relative;
            z-index: 1;
        }

        footer p { color: #2a4a6a; font-size: 0.9rem; }

        /* Responsive Design */
        @media (max-width: 968px) {
            header { flex-direction: column; gap: 1rem; padding: 1rem 3%; }
            nav ul { gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
            .hero { flex-direction: column-reverse; padding: 7rem 5% 3rem; text-align: center; }
            .hero-text h1 { font-size: 2.5rem; }
            .hero-text h3 { font-size: 1.5rem; }
            .hero-text p { margin: 0 auto 2rem; }
            .buttons { justify-content: center; }
            .hero-image img { width: 280px; height: 280px; }
        }

        @media (max-width: 576px) {
            .hero-text h1 { font-size: 2rem; }
            .hero-text h3 { font-size: 1.2rem; }
            .buttons a { padding: 0.8rem 1.8rem; font-size: 0.9rem; }
            nav ul { gap: 1rem; font-size: 0.9rem; }
        }

        .nav-link { color: #2a5a8a; text-decoration: none; }
        .nav-link.active {
            color: #0d6eaf;
            border-bottom: 2px solid #0d6eaf;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <header>
        <h2>Kevin Moenga.</h2>
        <nav>
            <ul>
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="About.html" class="nav-link">About</a></li>
                <li><a href="Skills.html" class="nav-link">Skills</a></li>
                <li><a href="Projects.html" class="nav-link">Projects</a></li>
                <li><a href="Contact Me.html" class="nav-link">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section id="home">
        <div class="hero">
            <div class="hero-text">
                <h1>Hello I'm <span>Kevin 👋</span></h1>
                <h3>FullStack Web Developer</h3>
                <p>
                    I'm a FullStack Web Developer based in Nairobi, and I'm very passionate and dedicated to my work.
                </p>
                <div class="buttons">
                    <a href="Contact Me.html">Contact Info</a>
                    <a href="#">Download CV</a>
                </div>
            </div>
            <div class="hero-image">
                <img src="portfolio.jpg" alt="Profile Picture">
            </div>
        </div>
    </section>

    <footer>
        <p>© 2025 Kevin Moenga. All Rights Reserved.</p>
    </footer>

    <script>
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 5 + 2;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${Math.random() * 100}%`;
            particle.style.top = `${Math.random() * 100}%`;
            particle.style.animationDelay = `${Math.random() * 15}s`;
            particlesContainer.appendChild(particle);
        }

        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
        });

        const cursor = document.createElement('div');
        cursor.style.cssText = `position:fixed;width:20px;height:20px;border-radius:50%;background:radial-gradient(circle,rgba(26,127,193,0.3),transparent);pointer-events:none;z-index:9999;transition:transform 0.1s ease;`;
        document.body.appendChild(cursor);
        document.addEventListener('mousemove', (e) => { cursor.style.left = e.clientX - 10 + 'px'; cursor.style.top = e.clientY - 10 + 'px'; });
        document.querySelectorAll('a, button').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.style.transform = 'scale(2)');
            el.addEventListener('mouseleave', () => cursor.style.transform = 'scale(1)');
        });

        document.addEventListener("DOMContentLoaded", () => {
            const links = document.querySelectorAll(".nav-link");
            const currentPage = window.location.pathname.split("/").pop();
            links.forEach(link => {
                if (link.getAttribute("href") === currentPage || (currentPage === "" && link.getAttribute("href") === "index.html")) {
                    link.classList.add("active");
                }
            });
        });
    </script>
</body>
</html>
